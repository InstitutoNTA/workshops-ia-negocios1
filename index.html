<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshops — IA Aplicada a Negócios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --card-bg: #13131f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }
  .blob {
    position: fixed; border-radius: 50%;
    filter: blur(120px); opacity: 0.12;
    pointer-events: none; z-index: 0;
  }
  .blob-1 { width:600px; height:600px; background:var(--accent); top:-200px; right:-200px; }
  .blob-2 { width:400px; height:400px; background:var(--accent2); bottom:100px; left:-100px; }

  header {
    position: relative; z-index: 1;
    padding: 60px 48px 48px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end;
    justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Syne', sans-serif; font-size: 11px;
    font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent2); background: rgba(0,212,170,0.08);
    border: 1px solid rgba(0,212,170,0.2);
    padding: 6px 14px; border-radius: 100px; margin-bottom: 20px;
  }
  .badge::before {
    content: ''; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent2);
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(0.8); }
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px,4vw,48px);
    font-weight: 800; line-height: 1.1; letter-spacing: -0.02em;
  }
  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { margin-top: 10px; color: var(--muted); font-size: 15px; font-weight: 300; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .count-pill {
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--accent); background: rgba(108,99,255,0.1);
    border: 1px solid rgba(108,99,255,0.2);
    padding: 8px 16px; border-radius: 100px;
  }
  .update-info { font-size: 12px; color: var(--muted); }

  main {
    position: relative; z-index: 1;
    padding: 48px; max-width: 1100px; margin: 0 auto;
  }
  .workshop-list { display: flex; flex-direction: column; gap: 16px; }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; padding: 60px; color: var(--muted); font-size: 15px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Cards */
  .workshop-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    opacity: 0; transform: translateY(16px);
    animation: fadeUp 0.4s ease forwards;
  }
  .workshop-card:hover {
    border-color: rgba(108,99,255,0.35);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(108,99,255,0.1);
  }
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

  .card-header {
    display: flex; align-items: center;
    gap: 20px; padding: 24px 28px;
  }
  .card-number {
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    color: var(--accent); background: rgba(108,99,255,0.1);
    border: 1px solid rgba(108,99,255,0.2);
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-date { font-size: 12px; color: var(--muted); font-weight: 400; margin-bottom: 4px; }
  .card-title {
    font-family: 'Syne', sans-serif; font-size: 16px;
    font-weight: 700; line-height: 1.3; color: var(--text);
  }
  .card-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    padding: 10px 18px; border-radius: 10px; text-decoration: none;
    transition: all 0.2s; white-space: nowrap; border: none; cursor: pointer;
  }
  .btn-video { background: var(--accent); color: #fff; }
  .btn-video:hover {
    background: #7c75ff;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4);
    transform: translateY(-1px);
  }
  .btn-material {
    background: transparent; color: var(--accent2);
    border: 1px solid rgba(0,212,170,0.3);
  }
  .btn-material:hover {
    background: rgba(0,212,170,0.08);
    border-color: var(--accent2); transform: translateY(-1px);
  }
  .btn-multi {
    background: transparent; color: var(--accent2);
    border: 1px solid rgba(0,212,170,0.3);
  }
  .btn-multi:hover { background: rgba(0,212,170,0.08); border-color: var(--accent2); }
  .chevron { transition: transform 0.2s; }

  .materials-dropdown {
    display: none; border-top: 1px solid var(--border);
    background: rgba(0,212,170,0.03);
    padding: 16px 28px 20px; flex-direction: column; gap: 10px;
  }
  .materials-dropdown.open { display: flex; }
  .materials-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
  }
  .material-item {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--accent2); text-decoration: none;
    padding: 8px 14px; border-radius: 8px;
    border: 1px solid rgba(0,212,170,0.2);
    background: rgba(0,212,170,0.04);
    width: fit-content; transition: all 0.2s;
  }
  .material-item:hover {
    background: rgba(0,212,170,0.1);
    border-color: var(--accent2); transform: translateX(4px);
  }
  .icon { width: 16px; height: 16px; flex-shrink: 0; }

  footer {
    position: relative; z-index: 1;
    padding: 32px 48px; border-top: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 16px;
  }
  footer p { font-size: 13px; color: var(--muted); }
  footer strong { color: var(--text); font-weight: 500; }

  @media (max-width: 700px) {
    header, main, footer { padding: 32px 20px; }
    .card-header { flex-direction: column; align-items: flex-start; gap: 14px; }
    .card-actions { flex-wrap: wrap; }
    .header-right { align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header>
  <div class="header-left">
    <div class="badge">Conteúdo Exclusivo</div>
    <h1>Workshops <span>IA Aplicada<br>a Negócios</span></h1>
    <p class="subtitle">Acesse as gravações e materiais de cada aula</p>
  </div>
  <div class="header-right">
    <div class="count-pill" id="count-pill">Carregando...</div>
    <span class="update-info" id="update-info"></span>
  </div>
</header>

<main>
  <div class="workshop-list" id="workshop-list">
    <div class="loading">
      <div class="spinner"></div>
      Carregando workshops...
    </div>
  </div>
</main>

<footer>
  <p>Programa <strong>IA Aplicada a Negócios</strong> · Acesso exclusivo para alunos matriculados</p>
  <p>Dúvidas? Fale com o suporte pelo portal do aluno</p>
</footer>

<script>
  // Ícones reutilizáveis
  const iconPlay = `<svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  const iconFile = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
  const iconChevron = `<svg class="icon chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`;

  function toggleMaterials(btn) {
    const card = btn.closest('.workshop-card');
    const dropdown = card.querySelector('.materials-dropdown');
    const chevron = btn.querySelector('.chevron');
    const isOpen = dropdown.classList.contains('open');

    document.querySelectorAll('.materials-dropdown.open').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.chevron').forEach(c => c.style.transform = 'rotate(0deg)');

    if (!isOpen) {
      dropdown.classList.add('open');
      chevron.style.transform = 'rotate(180deg)';
    }
  }

  function buildCard(w, index) {
    const temMaterial = w.materiais && w.materiais.length > 0;
    const multiplos = temMaterial && w.materiais.length > 1;

    let materialHTML = '';

    if (!temMaterial) {
      materialHTML = '';
    } else if (multiplos) {
      const itens = w.materiais.map(m =>
        `<a class="material-item" href="${m.link}" target="_blank">${iconFile}${m.nome}</a>`
      ).join('');
      materialHTML = `
        <button class="btn btn-multi" onclick="toggleMaterials(this)">
          ${iconFile} Materiais ${iconChevron}
        </button>
        <div class="materials-dropdown">
          <div class="materials-label">Materiais disponíveis</div>
          ${itens}
        </div>`;
    } else {
      materialHTML = `
        <a class="btn btn-material" href="${w.materiais[0].link}" target="_blank">
          ${iconFile} Material
        </a>`;
    }

    const dropdownBlock = multiplos ? `
      <div class="materials-dropdown">
        <div class="materials-label">Materiais disponíveis</div>
        ${w.materiais.map(m => `<a class="material-item" href="${m.link}" target="_blank">${iconFile}${m.nome}</a>`).join('')}
      </div>` : '';

    const actionsSimple = multiplos ? `
      <a class="btn btn-video" href="${w.video}" target="_blank">${iconPlay} Assistir</a>
      <button class="btn btn-multi" onclick="toggleMaterials(this)">${iconFile} Materiais ${iconChevron}</button>
    ` : `
      <a class="btn btn-video" href="${w.video}" target="_blank">${iconPlay} Assistir</a>
      ${temMaterial ? `<a class="btn btn-material" href="${w.materiais[0].link}" target="_blank">${iconFile} Material</a>` : ''}
    `;

    return `
      <div class="workshop-card" style="animation-delay:${0.05 * (index + 1)}s">
        <div class="card-header">
          <div class="card-number">${String(w.numero).padStart(2,'0')}</div>
          <div class="card-info">
            <div class="card-date">${w.data}</div>
            <div class="card-title">${w.titulo}</div>
          </div>
          <div class="card-actions">${actionsSimple}</div>
        </div>
        ${dropdownBlock}
      </div>`;
  }

  // Busca o JSON e renderiza
  async function carregarWorkshops() {
    const list = document.getElementById('workshop-list');
    const countPill = document.getElementById('count-pill');
    const updateInfo = document.getElementById('update-info');

    try {
      // Busca o arquivo JSON com cache-busting para garantir versão mais recente
      const res = await fetch(`workshops.json?v=${Date.now()}`);
      if (!res.ok) throw new Error('Erro ao carregar dados');
      const workshops = await res.json();

      countPill.textContent = `${workshops.length} workshop${workshops.length !== 1 ? 's' : ''} disponível${workshops.length !== 1 ? 'is' : ''}`;

      const agora = new Date();
      const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
      updateInfo.textContent = `Atualizado em ${meses[agora.getMonth()]} de ${agora.getFullYear()}`;

      list.innerHTML = workshops.map((w, i) => buildCard(w, i)).join('');
    } catch (err) {
      list.innerHTML = `
        <div class="loading" style="color:#ff6b6b;">
          ⚠️ Não foi possível carregar os workshops. Verifique sua conexão.
        </div>`;
    }
  }

  carregarWorkshops();
</script>

</body>
</html>
